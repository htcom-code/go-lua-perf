# GitHub Actions CI — mirrors the Makefile's verification discipline
# (vet → test → race → build, plus bench) on pull requests and pushes to main,
# and only when source files change (doc-only changes are skipped).
# The Makefile is the single source of truth: jobs call `make <target>` where a
# target exists; the extra hardening steps (gofmt gate, govulncheck,
# cross-platform build, coverage) are CI-only and call `go` directly.

name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast fail on formatting before spending time on the heavier jobs. The repo
  # keeps LF line endings (.gitattributes) so gofmt is consistent across OSes.
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"
            exit 1
          fi

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod # tracks the toolchain pinned in go.mod
          cache: true # module + build cache, keyed on go.sum
      - run: make vet
      # The test gate, with a coverage profile attached (equivalent to `make test`).
      - name: test (with coverage)
        run: go test -covermode=atomic -coverprofile=coverage.out ./...
      - run: make race
      - name: upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: warn

  # Scan dependencies and code for known vulnerabilities.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        env:
          # govulncheck@latest requires a newer Go than go.mod pins; allow the
          # toolchain to auto-upgrade for the tool install. setup-go v6 defaults
          # GOTOOLCHAIN to "local", which otherwise blocks this.
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # build runs only after verify passes, mirroring Makefile rule #6
  # ("build only after tests pass"), and proves the library + all `go` targets
  # are cross-platform (the README's Windows/macOS claim). `make` isn't assumed
  # on Windows, so call `go` directly.
  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...

  # bench is observational, not a gate — a slow/noisy run must not fail CI.
  bench:
    needs: verify
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make bench
